name: Reproduce v3.0.4 Crash

on:
  workflow_dispatch:

jobs:
  test-crash-repro:
    # Test on Ubuntu (WSL) and Windows to cover both bases
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.10", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 1. Install the SPECIFIC version user complained about
      # We do NOT use 'pip install .' because we want the PyPI version
      - name: Install dspy-ai 3.0.4
        run: |
          pip install dspy-ai==3.0.4
          
      # 2. Inspect what Pip actually installed (The "Aha!" moment)
      # This will likely show Numpy 2.0.0+ installed
      - name: Check Dependency Versions
        run: |
          pip list
          python -c "import numpy; print(f'Numpy Version: {numpy.__version__}')"
          python -c "import sqlalchemy; print(f'SQLAlchemy Version: {sqlalchemy.__version__}')"

      # 3. Try to Import (This is where it should crash)
      - name: Attempt Import
        run: python -c "import dspy; print('Success!')"
